# Build uv release binaries for our target platforms.
#
# Called from:
# - .github/workflows/release.yml
name: "Build release binaries"

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

permissions: {}

jobs:
  macos-aarch64:
    name: aarch64-apple-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Aikido Safe Chain"
        uses: ./.github/actions/setup-safe-chain

      - name: "Install Rust toolchain"
        run: rustup target add aarch64-apple-darwin

      - name: "Build"
        run: cargo build --release --locked --target aarch64-apple-darwin --features self-update

      - name: "Archive binary"
        run: |
          TARGET=aarch64-apple-darwin
          ARCHIVE_NAME=uv-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/uv $ARCHIVE_NAME/uv
          cp target/$TARGET/release/uvx $ARCHIVE_NAME/uvx
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          shasum -a 256 $ARCHIVE_FILE > $ARCHIVE_FILE.sha256

      - name: "Test binary"
        run: ./uv-aarch64-apple-darwin/uv --version

      - name: "Upload binary"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-aarch64-apple-darwin
          path: |
            *.tar.gz
            *.sha256

  linux-x86_64:
    name: x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Aikido Safe Chain"
        uses: ./.github/actions/setup-safe-chain

      - name: "Install Rust toolchain"
        run: rustup target add x86_64-unknown-linux-gnu

      - name: "Build"
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu --features self-update

      - name: "Archive binary"
        run: |
          TARGET=x86_64-unknown-linux-gnu
          ARCHIVE_NAME=uv-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/uv $ARCHIVE_NAME/uv
          cp target/$TARGET/release/uvx $ARCHIVE_NAME/uvx
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          sha256sum $ARCHIVE_FILE > $ARCHIVE_FILE.sha256

      - name: "Test binary"
        run: ./uv-x86_64-unknown-linux-gnu/uv --version

      - name: "Upload binary"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-x86_64-unknown-linux-gnu
          path: |
            *.tar.gz
            *.sha256

  linux-aarch64:
    name: aarch64-unknown-linux-gnu
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Aikido Safe Chain"
        uses: ./.github/actions/setup-safe-chain

      - name: "Install cross-compilation toolchain"
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: "Install Rust toolchain"
        run: rustup target add aarch64-unknown-linux-gnu

      - name: "Build"
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          JEMALLOC_SYS_WITH_LG_PAGE: "16"
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu --features self-update

      - name: "Archive binary"
        run: |
          TARGET=aarch64-unknown-linux-gnu
          ARCHIVE_NAME=uv-$TARGET
          ARCHIVE_FILE=$ARCHIVE_NAME.tar.gz

          mkdir -p $ARCHIVE_NAME
          cp target/$TARGET/release/uv $ARCHIVE_NAME/uv
          cp target/$TARGET/release/uvx $ARCHIVE_NAME/uvx
          tar czvf $ARCHIVE_FILE $ARCHIVE_NAME
          sha256sum $ARCHIVE_FILE > $ARCHIVE_FILE.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-aarch64-unknown-linux-gnu
          path: |
            *.tar.gz
            *.sha256
